<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background with premium slate color -->
  <rect width="128" height="128" rx="28" fill="#0F172A" />
  
  <!-- Outer glowing rings representing precision lenses -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#334155" stroke-width="4" />
  <circle cx="64" cy="64" r="32" fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" />
  
  <!-- Sleek premium angled tail that completes the letter 'Q' (as in Eye-Q) -->
  <path d="M86 86 L106 106" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" />
  
  <!-- Central golden circular pupil representing vision, clarity and high-end focus -->
  <circle cx="64" cy="64" r="10" fill="#F59E0B" />
  
  <!-- Gentle elegant reflection dot for that premium glassy depth -->
  <circle cx="80" cy="48" r="3" fill="#FFFFFF" opacity="0.9" />
</svg>
